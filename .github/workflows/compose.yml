name: Docker Compose Validation

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      relevant: ${{ steps.filter.outputs.relevant }}
    steps:
      - uses: actions/checkout@v4
      - id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            relevant:
              - "docker-compose*.yml"
              - ".env.dev"
              - ".env.local"
              - ".env.prod"

  validate:
    needs: changes
    if: needs.changes.outputs.relevant == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate docker-compose.yml
        run: docker compose -f docker-compose.yml config --quiet

      - name: Validate docker-compose.dev.yml
        run: docker compose -f docker-compose.dev.yml --env-file .env.dev config --quiet

      - name: Validate docker-compose.local.yml
        run: docker compose -f docker-compose.local.yml --env-file .env.local config --quiet

      - name: Validate docker-compose.prod.yml
        run: docker compose -f docker-compose.prod.yml --env-file .env.prod config --quiet
