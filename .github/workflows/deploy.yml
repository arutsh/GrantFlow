name: Deploy to VPS

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.0.3
        env:
          POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          POSTGRES_DB: ${{ secrets.POSTGRES_DB }}
          RABBITMQ_USER: ${{ secrets.RABBITMQ_USER }}
          RABBITMQ_PASS: ${{ secrets.RABBITMQ_PASS }}
          RABBITMQ_URL: ${{ secrets.RABBITMQ_URL }}
          USERS_DATABASE_URL: ${{ secrets.USERS_DATABASE_URL }}
          BUDGET_DATABASE_URL: ${{ secrets.BUDGET_DATABASE_URL }}
          AI_DATABASE_URL: ${{ secrets.AI_DATABASE_URL }}
          JWT_SECRET_KEY: ${{ secrets.JWT_SECRET_KEY }}
          ENCRYPTION_KEY: ${{ secrets.ENCRYPTION_KEY }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          envs: POSTGRES_USER,POSTGRES_PASSWORD,POSTGRES_DB,RABBITMQ_USER,RABBITMQ_PASS,RABBITMQ_URL,USERS_DATABASE_URL,BUDGET_DATABASE_URL,AI_DATABASE_URL,JWT_SECRET_KEY,ENCRYPTION_KEY
          script: |
            set -euo pipefail
            cd /opt/grandflow

            # This checkout is deploy-only — always reset to match main, never
            # edited by hand on the server.
            git fetch origin main
            git reset --hard origin/main

            # The committed .env.prod / services/*/.env.*.prod files are templates
            # with ${VAR} placeholders. Substitute real values from GitHub Actions
            # secrets in place, in this working tree, right before starting
            # containers — the real values are never committed back.
            VARS='$POSTGRES_USER $POSTGRES_PASSWORD $POSTGRES_DB $RABBITMQ_USER $RABBITMQ_PASS $RABBITMQ_URL $USERS_DATABASE_URL $BUDGET_DATABASE_URL $AI_DATABASE_URL $JWT_SECRET_KEY $ENCRYPTION_KEY'
            for f in .env.prod services/users/.env.users.prod services/budget/.env.budget.prod services/ai/.env.ai.prod services/worker/.env.worker.prod; do
              envsubst "$VARS" < "$f" > "$f.real"
              mv "$f.real" "$f"
            done

            docker compose --env-file .env.prod -f docker-compose.prod.yml up -d --build
            docker image prune -f
