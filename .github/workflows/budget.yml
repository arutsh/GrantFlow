name: Budget Service CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      relevant: ${{ steps.filter.outputs.relevant }}
    steps:
      - uses: actions/checkout@v4
      - id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            relevant:
              - "services/budget/**"
              - "shared/**"

  budget-test:
    needs: changes
    if: needs.changes.outputs.relevant == 'true'
    runs-on: ubuntu-latest
    env:
      BUDGET_DATABASE_URL: ${{ secrets.BUDGET_DATABASE_URL }}
      CUSTOMER_SERVICE_URL: ${{ secrets.CUSTOMER_SERVICE_URL }}
      PYTHONPATH: ${{ github.workspace }}/services/budget:${{ github.workspace }}
      USER_SERVICE_URL: http://localhost:8000
      USER_ALL_SERVICES_URL: http://localhost:8000
      REDIS_URL: redis://localhost:6379
      RABBITMQ_URL: amqp://guest:guest@localhost:5672/
      RABBITMQ_EXCHANGE: grandflow.events
      RABBITMQ_QUEUE: budget.queue
      LOG_LEVEL: INFO
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r services/budget/requirements.txt

      - name: Lint
        working-directory: ./services/budget
        run: |
          pip install black mypy flake8
          black --check ./app
          mypy ./app
          flake8 ./app

      - name: Run tests
        working-directory: ./services/budget
        run: python -m pytest tests/ -v
