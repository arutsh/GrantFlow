worker_processes 1;

events { worker_connections 1024; }

http {
    sendfile on;
    client_max_body_size 20M;

    # In dev mode, services run locally on the host
    upstream users {
        server host.docker.internal:8000;
    }

    upstream budget {
        server host.docker.internal:8001;
    }

    upstream ai {
        server host.docker.internal:8002;
    }

    upstream chat {
        server host.docker.internal:8003;
    }

    map $http_origin $cors_origin {
        default "";
        "~^http://localhost:3000$" "http://localhost:3000";
        "~^http://localhost:3001$" "http://localhost:3001";
        "~^http://127\.0\.0\.1:3000$" "http://127.0.0.1:3000";
        "~^http://127\.0\.0\.1:3001$" "http://127.0.0.1:3001";
        "~^http://localhost:5173$" "http://localhost:5173";
    }

    server {
        listen 80;

        # ---- CORS Headers ----
        add_header 'Access-Control-Allow-Origin' $cors_origin always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, PATCH, DELETE, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' 'Content-Type, Authorization' always;
        add_header 'Access-Control-Allow-Credentials' 'true' always;
        # Custom response headers are invisible to browser JS unless explicitly exposed —
        # without this, the frontend can never read X-Session-Id and every chat turn
        # starts a brand-new session with no history.
        add_header 'Access-Control-Expose-Headers' 'X-Session-Id, X-Conversation-Id' always;

        # Handle preflight requests
        if ($request_method = 'OPTIONS') {
            return 204;
        }

        # ---- USERS SERVICE ----
        location /api/v1/users/ {
            proxy_pass http://users/api/users/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ---- AUTH SERVICE ----
        location /api/v1/auth/ {
            proxy_pass http://users/api/auth/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ---- USER REGISTRATION ----
        location /api/v1/register {
            proxy_pass http://users/api/register;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ---- BUDGET SERVICE ----
        location /api/v1/budgets/ {
            proxy_pass http://budget/api/v1/budgets/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ---- BUDGET LINES SERVICE ----
        location /api/v1/budget-lines/ {
            proxy_pass http://budget/api/v1/budget-lines/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ---- AI SETTINGS (proxied through users service) ----
        location /api/v1/users/me/ai-settings {
            proxy_pass http://users/api/users/me/ai-settings;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ---- AI SERVICE ----
        location /api/v1/ai/ {
            proxy_pass http://ai/api/v1/ai/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_buffering off;
            proxy_cache off;
            proxy_set_header Connection '';
            proxy_http_version 1.1;
            chunked_transfer_encoding on;
            # Dev-only: long-running agent tool-calling loops can take a while to debug.
            proxy_read_timeout 600s;
            proxy_send_timeout 600s;
        }

        # ---- CHAT SERVICE (health only for now — SSE endpoints land in ticket #92) ----
        location /api/v1/chat/health {
            proxy_pass http://chat/health;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /api/v1/chat/ {
            proxy_pass http://chat/api/v1/chat/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_buffering off;
            proxy_cache off;
            proxy_set_header Connection '';
            proxy_http_version 1.1;
            chunked_transfer_encoding on;
            # Dev-only: long-running agent tool-calling loops can take a while to debug.
            proxy_read_timeout 600s;
            proxy_send_timeout 600s;
        }
    }
}
