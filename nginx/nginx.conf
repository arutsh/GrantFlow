worker_processes 1;

events { worker_connections 1024; }

http {
    sendfile on;
    client_max_body_size 20M;

    # Docker internal DNS resolver
    resolver 127.0.0.11 valid=30s;

    map $http_origin $cors_origin {
        default "";
        "~^http://localhost:4000$"       "http://localhost:4000";
        "~^http://localhost:9082$"       "http://localhost:9082";
        "~^http://127\.0\.0\.1:4000$"   "http://127.0.0.1:4000";
    }

    server {
        listen 80;

        # ---- CORS Headers ----
        add_header 'Access-Control-Allow-Origin' $cors_origin always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, PATCH, DELETE, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' 'Content-Type, Authorization' always;
        add_header 'Access-Control-Allow-Credentials' 'true' always;
        # Custom response headers are invisible to browser JS unless explicitly exposed —
        # without this, the frontend can never read X-Session-Id and every chat turn
        # starts a brand-new session with no history.
        add_header 'Access-Control-Expose-Headers' 'X-Session-Id, X-Conversation-Id' always;

        if ($request_method = 'OPTIONS') {
            return 204;
        }

        # ---- USERS SERVICE ----
        # proxy_pass with a variable does not do location-prefix rewriting the
        # way a literal proxy_pass URI does — anything after the matched
        # location prefix (e.g. the "123" in /api/v1/users/123) was silently
        # dropped. rewrite ...break; up front + a bare (no-URI) proxy_pass
        # preserves the full path through the variable-based upstream.
        location /api/v1/users/ {
            set $users_service "http://users:8000";
            rewrite ^/api/v1/users/(.*)$ /api/users/$1 break;
            proxy_pass $users_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ---- AUTH SERVICE ----
        location /api/v1/auth/ {
            set $users_service "http://users:8000";
            rewrite ^/api/v1/auth/(.*)$ /api/auth/$1 break;
            proxy_pass $users_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ---- USER REGISTRATION ----
        location /api/v1/register {
            set $users_service "http://users:8000";
            rewrite ^/api/v1/register$ /api/register break;
            proxy_pass $users_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ---- BUDGET SERVICE ----
        location /api/v1/budgets/ {
            set $budget_service "http://budget:8000";
            rewrite ^/api/v1/budgets/(.*)$ /api/v1/budgets/$1 break;
            proxy_pass $budget_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ---- BUDGET LINES SERVICE ----
        location /api/v1/budget-lines/ {
            set $budget_service "http://budget:8000";
            rewrite ^/api/v1/budget-lines/(.*)$ /api/v1/budget-lines/$1 break;
            proxy_pass $budget_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ---- AI SETTINGS (proxied through users service) ----
        location /api/v1/users/me/ai-settings {
            set $users_service "http://users:8000";
            rewrite ^/api/v1/users/me/ai-settings(.*)$ /api/users/me/ai-settings$1 break;
            proxy_pass $users_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ---- AI SERVICE ----
        location /api/v1/ai/ {
            set $ai_service "http://ai:8000";
            rewrite ^/api/v1/ai/(.*)$ /api/v1/ai/$1 break;
            proxy_pass $ai_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_buffering off;
            proxy_cache off;
            proxy_set_header Connection '';
            proxy_http_version 1.1;
            chunked_transfer_encoding on;
        }

        # ---- CHAT SERVICE (health only for now — SSE endpoints land in ticket #92) ----
        location /api/v1/chat/health {
            set $chat_service "http://chat:8000";
            rewrite ^/api/v1/chat/health$ /health break;
            proxy_pass $chat_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /api/v1/chat/ {
            set $chat_service "http://chat:8000";
            rewrite ^/api/v1/chat/(.*)$ /api/v1/chat/$1 break;
            proxy_pass $chat_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_buffering off;
            proxy_cache off;
            proxy_set_header Connection '';
            proxy_http_version 1.1;
            chunked_transfer_encoding on;
        }

        # ---- FRONTEND ----
        location / {
            set $frontend_service "http://frontend:80";
            rewrite ^/(.*)$ /$1 break;
            proxy_pass $frontend_service;
        }
    }
}
