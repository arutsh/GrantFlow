worker_processes 1;

events { worker_connections 1024; }

http {
    sendfile on;
    client_max_body_size 20M;

    # Docker internal DNS resolver
    resolver 127.0.0.11 valid=30s;

    map $http_origin $cors_origin {
        default "";
        "~^http://localhost:4000$"       "http://localhost:4000";
        "~^http://localhost:9082$"       "http://localhost:9082";
        "~^http://127\.0\.0\.1:4000$"   "http://127.0.0.1:4000";
    }

    server {
        listen 80;

        # ---- CORS Headers ----
        add_header 'Access-Control-Allow-Origin' $cors_origin always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, PATCH, DELETE, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' 'Content-Type, Authorization' always;
        add_header 'Access-Control-Allow-Credentials' 'true' always;
        # Custom response headers are invisible to browser JS unless explicitly exposed —
        # without this, the frontend can never read X-Session-Id and every chat turn
        # starts a brand-new session with no history.
        add_header 'Access-Control-Expose-Headers' 'X-Session-Id' always;

        if ($request_method = 'OPTIONS') {
            return 204;
        }

        # ---- USERS SERVICE ----
        location /api/v1/users/ {
            set $users_service "http://users:8000";
            proxy_pass $users_service/api/users/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ---- AUTH SERVICE ----
        location /api/v1/auth/ {
            set $users_service "http://users:8000";
            proxy_pass $users_service/api/auth/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ---- USER REGISTRATION ----
        location /api/v1/register {
            set $users_service "http://users:8000";
            proxy_pass $users_service/api/register;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ---- BUDGET SERVICE ----
        location /api/v1/budgets/ {
            set $budget_service "http://budget:8000";
            proxy_pass $budget_service/api/v1/budgets/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ---- BUDGET LINES SERVICE ----
        location /api/v1/budget-lines/ {
            set $budget_service "http://budget:8000";
            proxy_pass $budget_service/api/v1/budget-lines/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ---- AI SETTINGS (proxied through users service) ----
        location /api/v1/users/me/ai-settings {
            set $users_service "http://users:8000";
            proxy_pass $users_service/api/users/me/ai-settings;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ---- AI CHAT STREAM (SSE, proxied through users service) ----
        location /api/v1/users/me/chat/stream {
            set $users_service "http://users:8000";
            proxy_pass $users_service/api/users/me/chat/stream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_buffering off;
            proxy_cache off;
            proxy_set_header Connection '';
            proxy_http_version 1.1;
            chunked_transfer_encoding on;
        }

        # ---- AI SERVICE ----
        location /api/v1/ai/ {
            set $ai_service "http://ai:8000";
            proxy_pass $ai_service/api/v1/ai/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_buffering off;
            proxy_cache off;
            proxy_set_header Connection '';
            proxy_http_version 1.1;
            chunked_transfer_encoding on;
        }

        # ---- FRONTEND ----
        location / {
            set $frontend_service "http://frontend:80";
            proxy_pass $frontend_service/;
        }
    }
}
